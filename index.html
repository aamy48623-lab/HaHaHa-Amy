<!DOCTYPE html>
<html>
<head>
  <title>Mini Store</title>
  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f5f5f5;
    }

    .shop{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:40px;
    }

    .item{
      background:white;
      padding:20px;
      border-radius:10px;
      width:200px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    button{
      padding:10px 15px;
      border:none;
      background:#4CAF50;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    h1{
      color:#333;
    }
  </style>
</head>
<body>

<h1>我的小商店</h1>

<h2>購物車總金額：$<span id="total">0</span></h2>

<div class="shop">

  <div class="item">
    <h3>蘋果</h3>
    <p>$30</p>
    <button onclick="addToCart(30)">加入購物車</button>
  </div>

  <div class="item">
    <h3>飲料</h3>
    <p>$50</p>
    <button onclick="addToCart(50)">加入購物車</button>
  </div>

  <div class="item">
    <h3>餅乾</h3>
    <p>$40</p>
    <button onclick="addToCart(40)">加入購物車</button>
  </div>

</div>

<script>
  let total = 0;

  function addToCart(price){
    total += price;
    document.getElementById("total").innerHTML = total;
  }
</script>

</body>
</html>
